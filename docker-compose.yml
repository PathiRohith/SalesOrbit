version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: sales_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: sales_api
    volumes:
      - ./knowledge:/app/knowledge
      - ./chroma_db:/app/chroma_db
    command: >
      sh -c "python init_db.py && 
             uvicorn api.main:app --host 0.0.0.0 --port 8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: sales_worker
    volumes:
      - ./knowledge:/app/knowledge
      - ./chroma_db:/app/chroma_db
    command: celery -A workers.celery_app.app worker --loglevel=info --concurrency=4
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

  dashboard:
    image: mher/flower
    container_name: sales_flower
    command: celery --broker=redis://redis:6379/0 flower
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker